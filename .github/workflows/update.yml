name: Update Stroomtip

on:
  schedule:
    # UTC-tijden; België is UTC+2 in de zomer, UTC+1 in de winter.
    # 3 runs per dag als vangnet: mislukt de eerste, dan vangt de volgende het op.
    - cron: '30 11 * * *'   # 13:30 zomertijd / 12:30 wintertijd
    - cron: '30 13 * * *'   # 15:30 zomertijd / 14:30 wintertijd
    - cron: '30 16 * * *'   # 18:30 zomertijd / 17:30 wintertijd
  workflow_dispatch:        # ook manueel te starten via de Actions-pagina

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python instellen
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Packages installeren
        run: pip install requests

      - name: Dashboard genereren
        env:
          ENTSOE_TOKEN: ${{ secrets.ENTSOE_TOKEN }}
        run: python3 epex_dashboard.py

      - name: Pushen naar GitHub
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add index.html
          git diff --cached --quiet || git commit -m "stroomtip update $(date '+%Y-%m-%d %H:%M')"
          git push
